# サイト公開 — site/ を GitHub Pages にデプロイ(ダッシュボードデータは state/ から生成)
name: サイト公開

on:
  push:
    branches: [main]
    paths: [site/**, state/**, assets/**]
  schedule:
    - cron: '30 21 * * *'   # 毎日 06:30 JST(ハートビート前に鮮度を担保)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pixelyen-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: ダッシュボードデータ生成
        run: python3 scripts/build_dashboard.py
      - name: アバターをsiteへ同期
        run: |
          mkdir -p site/assets/avatars
          cp assets/avatars/*.svg site/assets/avatars/ 2>/dev/null || true
          cp assets/logo.svg site/assets/ 2>/dev/null || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
