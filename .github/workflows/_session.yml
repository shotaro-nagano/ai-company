# 共通セッションジョブ(reusable workflow)
# すべての社員セッションはここを通る。同時実行はしない(ORGANIZATION.md 技術仕様)。
name: _session

on:
  workflow_call:
    inputs:
      slug:
        required: true
        type: string
      class:
        required: true
        type: string   # daily | weekly | monthly | event | cs | heartbeat
      task:
        required: false
        type: string
        default: ""
      model_override:
        required: false
        type: string
        default: ""
      effort_override:
        required: false
        type: string
        default: ""

concurrency:
  group: pixelyen-session
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  session:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code をインストール
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: セッション実行
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          DISCORD_WEBHOOK_APPROVAL: ${{ secrets.DISCORD_WEBHOOK_APPROVAL }}
          DISCORD_WEBHOOK_SALES: ${{ secrets.DISCORD_WEBHOOK_SALES }}
          DISCORD_WEBHOOK_WEEKLY: ${{ secrets.DISCORD_WEBHOOK_WEEKLY }}
          DISCORD_WEBHOOK_MEETING: ${{ secrets.DISCORD_WEBHOOK_MEETING }}
          DISCORD_WEBHOOK_LOG: ${{ secrets.DISCORD_WEBHOOK_LOG }}
          DISCORD_WEBHOOK_ERROR: ${{ secrets.DISCORD_WEBHOOK_ERROR }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          ITCH_API_KEY: ${{ secrets.ITCH_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.GMAIL_OAUTH_REFRESH_TOKEN }}
          MODEL_OVERRIDE: ${{ inputs.model_override }}
          EFFORT_OVERRIDE: ${{ inputs.effort_override }}
        run: bash scripts/run_session.sh "${{ inputs.slug }}" "${{ inputs.class }}" "${{ inputs.task }}"

      - name: ダッシュボード再デプロイを依頼
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main || true
